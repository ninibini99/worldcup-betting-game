name: Render and publish Quarto site
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            rmarkdown
            knitr
            tidyverse
            plotly
            reactable
            htmltools
            readr
            dplyr
            stringr
            lubridate
            DT
            httr2
            purrr

      - name: Import Pavlovia predictions
        run: Rscript R/import_pavlovia.R

      - name: Update match results
        run: Rscript R/update_results.R
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: Render Quarto site
        run: quarto render

      - name: Commit rendered docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --soft origin/main
          git add docs .nojekyll data/predictions.csv data/results.csv
          git diff --cached --quiet || git commit -m "Render site"
          git push origin main
